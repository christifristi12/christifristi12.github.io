<!doctype html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>christian afoo website</title>
  <link href="extra_css/startscreen.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      // https://dashboard.emailjs.com/admin/account
      emailjs.init({
        publicKey: "iIl9-HOLdvJKFkVNG",
      });
    })();
  </script>
  <script type="text/javascript">
    window.onload = function() {
      document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();
        // these IDs from the previous steps
        emailjs.sendForm('service_0ja5k21', 'template_z23ouad', this)
                .then(() => {
                  console.log('SUCCESS!');
                }, (error) => {
                  console.log('FAILED...', error);
                });
      });
    }
  </script>
</head>
<body>

<nav class="navbar navbar-dark bg-dark text-light ">
  <div class="container">
    <a class="navbar-brand text-light fw-bold" href="index.html">Christian Afoo</a>
    <a href="index.html" class="nav-link">← Terug</a>

  </div>
</nav>
<section id="contact" class="container py-5">
  <h2 class="text-center mb-5">Neem contact op</h2>

  <div class="row justify-content-center">

    <div class="col-lg-8">

      <form id="contact-form" class="card bg-dark text-light p-4">

        <input type="hidden" name="time">

        <div class="mb-3">
          <label class="form-label">Naam</label>
          <input
                  type="text"
                  class="form-control"
                  name="name"
                  required>
        </div>

        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input
                  type="email"
                  class="form-control"
                  name="email"
                  required>
        </div>

        <div class="mb-3">
          <label class="form-label">Onderwerp</label>
          <input
                  type="text"
                  class="form-control"
                  name="title"
                  required>
        </div>

        <div class="mb-3">
          <label class="form-label">Bericht</label>
          <textarea
                  class="form-control"
                  rows="6"
                  name="message"
                  required></textarea>
        </div>

        <button class="btn btn-warning">
          Verstuur bericht
        </button>

      </form>

      <div class="text-center mt-4">

        <a href="https://github.com/christifristi12/christifristi12.github.io"
           target="_blank"
           class="btn btn-outline-light m-2">
          GitHub
        </a>


      </div>

    </div>

  </div>

</section>
</body>
